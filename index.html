<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="MagicRoute - Sistema de Gestão de Rotas e Entregas Logísticas" />
    <meta name="theme-color" content="#8c2cf5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MagicRoute" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>MagicRoute - Gestão de Rotas e Entregas</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => {
              console.log('[PWA] Service Worker registrado com sucesso!', reg.scope);
              
              // Monitorar atualizações
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        console.log('[PWA] Nova versão instalada. Recarregando...');
                        window.location.reload();
                      }
                    }
                  };
                }
              };
            })
            .catch((err) => console.error('[PWA] Falha ao registrar Service Worker:', err));
        });

        // Recarregar a página assim que o novo service worker assumir o controle (skipWaiting)
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            console.log('[PWA] Novo Service Worker assumiu o controle. Recarregando aba...');
            window.location.reload();
          }
        });
      }
    </script>
    <script type="module" crossorigin src="./assets/index-BvC5moTR.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-ZkM5iLeJ.css">
  </head>

    <div id="root"></div>
  </body>
</html>
